services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: dg-market-backend
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build:backend
    startCommand: npm run start:backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://dg-market.onrender.com   # update after frontend deploys
      - key: AFROMESSAGE_API_KEY
        sync: false
      - key: AFROMESSAGE_IDENTIFIER_ID
        sync: false
      - key: AFROMESSAGE_SENDER_NAME
        value: DG Market
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: dg-market-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build:frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://dg-market-backend.onrender.com/api   # update with actual backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
